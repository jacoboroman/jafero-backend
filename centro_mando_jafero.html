const CATEGORIES = [

  { label:"PRODUCTO",  ids:["atlas"] },
  { label:"MARKETING", ids:["pluma","voltio"] },

function Sidebar({ agents, activeId, onSelect, onHome }) {
  const now = new Date();
  const dateStr = `${String(now.getDate()).padStart(2,"0")}/${String(now.getMonth()+1).padStart(2,"0")}/${now.getFullYear()}`;
  return (
    <div style={{ width:210,minWidth:210,background:"#002a6a",borderRight:"1px solid rgba(0,127,255,0.25)",display:"flex",flexDirection:"column",height:"100%",overflowY:"auto" }}>
      {/* Logo */}
      <div onClick={onHome} style={{ padding:"14px 12px 11px",borderBottom:"1px solid rgba(0,127,255,0.25)",cursor:"pointer" }}>
        <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4 }}>
          <div style={{ width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#f43f5e,#f59e0b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#fff",flexShrink:0 }}>J</div>
          <div>
            <div style={{ fontSize:11,fontWeight:800,color:"#f1f5f9",lineHeight:1.1 }}>Centro de Mando</div>
            <div style={{ fontSize:9,color:"#f43f5e",letterSpacing:"0.1em",fontWeight:700 }}>JAFERO V2</div>
          </div>
        </div>
        <div style={{ fontSize:9,color:"#7ab8ff",marginTop:2 }}>
          <span style={{ color:"#1e40af" }}>● </span>{String(now.getHours()).padStart(2,"0")}:{String(now.getMinutes()).padStart(2,"0")} · {dateStr}
        </div>
      </div>

      {/* Categorías */}
      <div style={{ padding:"8px 8px",flex:1 }}>
        {CATEGORIES.map(cat => (
          <div key={cat.label} style={{ marginBottom:14 }}>
            <div style={{ fontSize:8.5,fontWeight:700,color:"#5a9fe0",letterSpacing:"0.12em",padding:"0 5px 5px",textTransform:"uppercase" }}>{cat.label}</div>
            {cat.ids.map(id => {
              const a = agents.find(x=>x.id===id);
              if (!a) return null;
              const active = activeId === id;
              return (
                <div key={id} onClick={()=>onSelect(id)}
                  style={{ display:"flex",alignItems:"center",gap:7,padding:"6px 6px",borderRadius:7,cursor:"pointer",marginBottom:2,
                    background:active?`${a.color}18`:"transparent",
                    border:`1px solid ${active?a.color+"30":"transparent"}`,transition:"all 0.15s" }}>
                  <div style={{ width:5,height:5,borderRadius:"50%",background:a.status==="online"?"#22c55e":"#f59e0b",flexShrink:0,animation:"pulse 2s infinite" }} />
                  <div style={{ flex:1,minWidth:0 }}>
                    <div style={{ fontSize:11,fontWeight:700,color:active?a.color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{a.name}</div>
                    <div style={{ fontSize:9,color:"#7ab8ff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{a.subtitle}</div>
                  </div>
                  <span style={{ fontSize:9,color:active?a.color:"#5a9fe0" }}>›</span>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Status bar */}
      <div style={{ padding:"8px 10px 10px",borderTop:"1px solid rgba(0,127,255,0.20)" }}>
        <div style={{ fontSize:9,color:"#5a9fe0",marginBottom:4 }}>ESTADO DEL SISTEMA</div>
        {[{l:"Agentes IA",v:"8 / Online",c:"#22c55e"},{l:"API",v:"Conectada",c:"#22c55e"},{l:"Alertas",v:"0",c:"#94a3b8"}].map(s=>(
          <div key={s.l} style={{ display:"flex",justifyContent:"space-between",marginBottom:3 }}>
            <span style={{ fontSize:9,color:"#7ab8ff" }}>{s.l}</span>
            <span style={{ fontSize:9,color:s.c,fontWeight:700 }}>{s.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

  );

/* ═══════════════════════ NETWORK GRAPH ═══════════════════════ */
function NetworkGraph({ agents, onSelect, hoveredId, onHover }) {
  return (
    <div style={{ flex:1,position:"relative",overflow:"hidden" }}>
      {/* Grid background */}
      <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.12 }}>
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e40af" strokeWidth="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
      </svg>

      {/* Network SVG */}
      <svg viewBox="0 0 800 504" preserveAspectRatio="xMidYMid meet"
        style={{ position:"absolute",inset:0,width:"100%",height:"100%" }}>
        <defs>
          {agents.map(a => (
            <filter key={a.id} id={`glow-${a.id}`} x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation={hoveredId===a.id?"6":"3"} result="blur"/>
              <feFlood floodColor={a.color} floodOpacity={hoveredId===a.id?"0.8":"0.4"} result="color"/>
              <feComposite in="color" in2="blur" operator="in" result="shadow"/>
              <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          ))}
          <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#f43f5e" stopOpacity="0.15"/>
            <stop offset="100%" stopColor="#f43f5e" stopOpacity="0"/>
          </radialGradient>
        </defs>

        {/* Center glow */}
        <ellipse cx="400" cy="252" rx="120" ry="90" fill="url(#centerGlow)"/>

        {/* Connection lines */}
        {CONNECTIONS.map(([a,b],i) => {
          const pa = NODE_POSITIONS[a], pb = NODE_POSITIONS[b];
          if (!pa || !pb) return null;
          const agA = agents.find(x=>x.id===a);
          const isCore = a==="core"||b==="core";
          const col = isCore ? (agents.find(x=>x.id===(a==="core"?b:a))?.color||"#7ab8ff") : "#5a9fe0";
          const highlighted = hoveredId===a||hoveredId===b;
          return (
            <line key={i}
              x1={pa.cx} y1={pa.cy} x2={pb.cx} y2={pb.cy}
              stroke={highlighted ? col : (isCore ? col : "#0f172a")}
              strokeWidth={highlighted ? 1.5 : (isCore ? 1 : 0.6)}
              strokeDasharray="8 6"
              strokeOpacity={highlighted ? 0.9 : (isCore ? 0.35 : 0.15)}
              style={{ animation:`dash ${2+i*0.3}s linear infinite` }}
            />
          );
        })}

        {/* Agent nodes */}
        {agents.map(a => {
          const pos = NODE_POSITIONS[a.id];
          if (!pos) return null;
          const isCore = a.id === "core";
          const hovered = hoveredId === a.id;
          const R = isCore ? 44 : 32;
          return (
            <g key={a.id} style={{ cursor:"pointer" }}
              onClick={() => onSelect(a.id)}
              onMouseEnter={() => onHover(a.id)}
              onMouseLeave={() => onHover(null)}>
              {/* Outer ring */}
              <circle cx={pos.cx} cy={pos.cy} r={R+10}
                fill="none" stroke={a.color}
                strokeWidth={hovered?"1.5":"0.8"}
                strokeDasharray={isCore?"none":"5 4"}
                strokeOpacity={hovered?"0.7":"0.25"}
                style={{ animation:`spin ${isCore?20:30+Math.random()*20}s linear infinite` }}/>
              {/* Glow circle */}
              <circle cx={pos.cx} cy={pos.cy} r={R+4}
                fill={a.color} fillOpacity={hovered?"0.12":"0.06"}
                filter={`url(#glow-${a.id})`}/>
              {/* Main circle */}
              <circle cx={pos.cx} cy={pos.cy} r={R}
                fill="#002a6a" stroke={a.color}
                strokeWidth={hovered||isCore?"2":"1.5"}
                strokeOpacity={hovered?"1":"0.7"}/>
              {/* Inner fill */}
              <circle cx={pos.cx} cy={pos.cy} r={R-2}
                fill={a.color} fillOpacity={hovered?"0.18":"0.08"}/>
              {/* Avatar image clipped to circle */}
              <defs>
                <clipPath id={`clip-${a.id}`}>
                  <circle cx={pos.cx} cy={pos.cy} r={R-4}/>
                </clipPath>
              </defs>
              {a.avatar
                ? <image href={a.avatar} x={pos.cx-(R-4)} y={pos.cy-(R-4)} width={(R-4)*2} height={(R-4)*2} clipPath={`url(#clip-${a.id})`} preserveAspectRatio="xMidYMid slice"/>
                : <text x={pos.cx} y={pos.cy+(isCore?-2:1)} textAnchor="middle" dominantBaseline="middle"
                    fontSize={isCore?13:9} fontWeight="800" fill={a.color}
                    style={{ letterSpacing:"0.05em" }}>{a.initials}</text>
              }
              {/* Name below */}
              <text x={pos.cx} y={pos.cy+R+14} textAnchor="middle"
                fontSize={isCore?11:9.5} fontWeight={isCore?"800":"700"} fill={hovered?a.color:"#94a3b8"}>
                {a.name}
              </text>
              {/* Subtitle below name */}
              <text x={pos.cx} y={pos.cy+R+25} textAnchor="middle"

                {a.subtitle.split(" ").slice(0,3).join(" ")}

              {/* Status dot */}

            </g>
          );
        })}
      </svg>

      {/* Hover tooltip */}
      {hoveredId && hoveredId !== "core" && (() => {
        const a = agents.find(x=>x.id===hoveredId);
        const pos = NODE_POSITIONS[hoveredId];

    const lines=text.split("\n"); const sects=[]; let cur=null;

      const h2=line.match(/^##\s+(.+)/);
      if (h2) { if(cur) sects.push(cur); cur={id:h2[1].replace(/[^\w]/g,"").toLowerCase(),title:h2[1].trim(),content:""}; }

## 🔍 ATLAS — PRODUCTO

LANZAR o NO LANZAR
[1 línea de motivo]

  const sel={padding:"6px 9px",borderRadius:7,border:"1px solid rgba(0,127,255,0.30)",fontSize:11,background:"rgba(0,127,255,0.25)",color:"#94a3b8",cursor:"pointer",width:"100%"};

  return (
    <div style={{ flex:1,display:"flex",flexDirection:"column",background:"#002a6a",height:"100%" }}>
      <div style={{ background:"#002a6a",borderBottom:"1px solid rgba(0,127,255,0.25)",padding:"12px 18px",display:"flex",alignItems:"center",gap:10,flexShrink:0 }}>
        <button onClick={onBack} style={{ background:"none",border:"none",cursor:"pointer",color:"#7ab8ff",fontSize:20,padding:"0 8px 0 0" }}>←</button>
        <div style={{ width:36,height:36,borderRadius:9,background:"rgba(34,197,94,0.12)",border:"1px solid rgba(34,197,94,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#22c55e",flexShrink:0 }}>SYS</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14,fontWeight:800,color:"#f1f5f9" }}>SYSTEM <span style={{ fontSize:11,color:"#22c55e" }}>Orquestador</span></div>
          <div style={{ fontSize:9,color:"#7ab8ff" }}>6 fases · POST /api · Producto listo para lanzar</div>
        </div>
        {decision && <div style={{ padding:"5px 12px",borderRadius:20,fontWeight:700,fontSize:11,background:decision==="LANZAR"?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${decision==="LANZAR"?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"}`,color:decision==="LANZAR"?"#22c55e":"#ef4444" }}>{decision==="LANZAR"?"🚀 LANZAR":"⛔ NO LANZAR"}</div>}
        {status==="loading" && <div style={{ display:"flex",alignItems:"center",gap:5,background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"4px 10px" }}><div style={{ width:5,height:5,borderRadius:"50%",background:"#22c55e",animation:"pulse 1s infinite" }}/><span style={{ fontSize:9,color:"#22c55e",fontWeight:700 }}>EJECUTANDO</span></div>}
      </div>

      <div style={{ flex:1,overflowY:"auto",padding:"18px 22px 24px" }}>
        {/* Objetivo */}
        <div style={{ background:"linear-gradient(135deg,rgba(244,63,94,0.12),rgba(245,158,11,0.08))",border:"1px solid rgba(244,63,94,0.2)",borderRadius:11,padding:"13px 14px",marginBottom:13 }}>
          <div style={{ fontSize:9,fontWeight:700,color:"#f59e0b",letterSpacing:"0.1em",marginBottom:7 }}>🎯 MODO OBJETIVO</div>
          <input value={objetivo} onChange={e=>setObjetivo(e.target.value)} placeholder="Ej: quiero ganar 1000€/mes, presupuesto inicial 200€..."
            style={{ width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid rgba(0,127,255,0.35)",background:"rgba(0,0,0,0.3)",color:"#e2e8f0",fontSize:12,fontFamily:"inherit" }}/>
        </div>

        {/* Filtros */}
        <div style={{ background:"rgba(0,127,255,0.25)",border:"1px solid rgba(0,127,255,0.25)",borderRadius:11,padding:"13px 14px",marginBottom:13 }}>
          <div style={{ fontSize:9,fontWeight:700,color:"#7ab8ff",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10 }}>Filtros de búsqueda</div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:11 }}>
            <div><div style={{ fontSize:8.5,color:"#7ab8ff",marginBottom:3 }}>Nicho</div><select value={nicho} onChange={e=>setNicho(e.target.value)} style={sel}>{NICHOS.map(n=><option key={n}>{n}</option>)}</select></div>
            <div><div style={{ fontSize:8.5,color:"#7ab8ff",marginBottom:3 }}>Precio</div><select value={precio} onChange={e=>setPrecio(e.target.value)} style={sel}>{PRECIOS.map(p=><option key={p}>{p}</option>)}</select></div>
            <div><div style={{ fontSize:8.5,color:"#7ab8ff",marginBottom:3 }}>Tipo</div><select value={tipo} onChange={e=>setTipo(e.target.value)} style={sel}>{TIPOS.map(t=><option key={t}>{t}</option>)}</select></div>
          </div>
          <button onClick={startRun} disabled={status==="loading"}
            style={{ width:"100%",padding:"11px 0",borderRadius:9,border:"none",background:status==="loading"?"#5a9fe0":"linear-gradient(135deg,#22c55e,#16a34a)",color:status==="loading"?"#7ab8ff":"#fff",fontSize:13,fontWeight:800,cursor:status==="loading"?"not-allowed":"pointer",boxShadow:status!=="loading"?"0 0 20px rgba(34,197,94,0.3)":"none" }}>
            {status==="loading"?"⏳ Ejecutando... (1-2 min)":"🚀 Ejecutar sistema completo"}
          </button>
        </div>

        {/* Loading */}
        {status==="loading" && (
          <div style={{ background:"rgba(0,127,255,0.25)",border:"1px solid rgba(0,127,255,0.25)",borderRadius:11,padding:"14px",marginBottom:12 }}>
            {PIPELINE_META.map((p,i)=>(
              <div key={p.id} style={{ display:"flex",alignItems:"center",gap:9,marginBottom:8 }}>
                <div style={{ width:26,height:26,borderRadius:6,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.2)",animation:`pulse ${1+i*0.15}s infinite` }}>{p.emoji}</div>
                <div style={{ flex:1 }}>
                  <span style={{ fontSize:11,fontWeight:600,color:"#92400e" }}>{p.name} · {p.label}</span>
                </div>
                <div style={{ display:"flex",gap:3 }}>{[0,1,2].map(j=><div key={j} style={{ width:5,height:5,borderRadius:"50%",background:"#f59e0b",animation:`bounce 1.2s ease-in-out ${i*0.1+j*0.2}s infinite` }} />)}</div>
              </div>
            ))}
          </div>
        )}

        {/* Resultados */}
        {status==="done" && sections.map(s=>{
          const open=expanded[s.id]!==false;
          const isDecision=/DECISI/i.test(s.title);
          const bc=isDecision?(decision==="LANZAR"?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.3)"):"rgba(34,197,94,0.2)";
          return (
            <div key={s.id} style={{ background:"rgba(0,127,255,0.25)",border:`1px solid ${bc}`,borderRadius:10,marginBottom:8,overflow:"hidden",animation:"fadeIn 0.3s ease" }}>
              <div onClick={()=>toggle(s.id)} style={{ padding:"11px 13px",display:"flex",alignItems:"center",gap:8,cursor:"pointer" }}>
                <span style={{ fontSize:14 }}>{s.title.match(/^\S+/)?.[0]||"📋"}</span>
                <span style={{ flex:1,fontSize:12,fontWeight:700,color:isDecision?(decision==="LANZAR"?"#22c55e":"#ef4444"):"#94a3b8" }}>{s.title.replace(/^\S+\s*/,"").split("—")[0].trim()}</span>
                <span style={{ fontSize:9,color:"#22c55e",fontWeight:600,marginRight:4 }}>✓</span>
                <span style={{ color:"#7ab8ff",fontSize:11,transform:open?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s" }}>▾</span>
              </div>
              {open && <div style={{ padding:"0 13px 13px",borderTop:"1px solid rgba(0,127,255,0.25)" }}><pre style={{ fontSize:11,color:"#94a3b8",lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word",margin:"10px 0 0",fontFamily:"inherit" }}>{s.content}</pre></div>}
            </div>
          );
        })}

        {status==="done" && (
          <div style={{ background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:11,padding:"16px",textAlign:"center",marginTop:4 }}>
            <div style={{ fontSize:22,marginBottom:6 }}>{decision==="LANZAR"?"🚀":"⛔"}</div>
            <div style={{ fontSize:14,fontWeight:800,color:decision==="LANZAR"?"#22c55e":"#ef4444",marginBottom:12 }}>{decision==="LANZAR"?"Decisión: LANZAR":"Decisión: NO LANZAR"}</div>
            <button onClick={startRun} style={{ padding:"8px 20px",borderRadius:9,border:"none",background:"#22c55e",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer" }}>🔄 Nuevo sistema</button>
          </div>
        )}
        {status==="idle" && <div style={{ textAlign:"center",padding:"24px",color:"#7ab8ff",fontSize:13 }}>Configura los filtros y pulsa <strong style={{color:"#e2e8f0"}}>Ejecutar sistema completo</strong>.</div>}
        {status==="error" && <div style={{ background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:"14px",textAlign:"center" }}><div style={{ color:"#ef4444",fontSize:12,marginBottom:9 }}>❌ {errorMsg}</div><button onClick={startRun} style={{ padding:"7px 18px",borderRadius:8,border:"none",background:"#ef4444",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer" }}>Reintentar</button></div>}
        <div ref={endRef}/>
      </div>
    </div>
  );
}

/* ═══════════════════════ APP ═══════════════════════ */
function App() {
  const [activeId,setActiveId]=useState(null);
  const [convs,   setConvs]   =useState({});
  const [input,   setInput]   =useState("");
  const [loading, setLoading] =useState(false);
  const endRef=useRef(null);
  const msgs=activeId?(convs[activeId]||[]):[];
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const send=async()=>{
    if(!input.trim()||loading||!activeId) return;
    const agent=AGENTS.find(a=>a.id===activeId);
    const userMsg={role:"user",content:input.trim()};
    const updated=[...msgs,userMsg];
    setConvs(p=>({...p,[activeId]:updated}));
    setInput(""); setLoading(true);
    try {
      const res=await fetch("/api",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-3-haiku-20240307",max_tokens:1500,system:agent.prompt,messages:updated})});
      const data=await res.json();
      const aiMsg={role:"assistant",content:data.response||"Error al generar respuesta."};
      setConvs(p=>({...p,[activeId]:[...updated,aiMsg]}));
    } catch {
      setConvs(p=>({...p,[activeId]:[...updated,{role:"assistant",content:"Error de conexión."}]}));
    }
    setLoading(false);
  };

  const handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
  const agent=activeId?AGENTS.find(a=>a.id===activeId):null;

  return (
    <div style={{ display:"flex",width:"100%",height:"100vh",overflow:"hidden" }}>
      <Sidebar agents={AGENTS} activeId={activeId} onSelect={setActiveId} onHome={()=>setActiveId(null)}/>
      <div style={{ flex:1,display:"flex",flexDirection:"column",minWidth:0,height:"100%" }}>
        {activeId==="system"
          ? <SystemView onBack={()=>setActiveId(null)}/>
          : agent
            ? <ChatView agent={agent} messages={msgs} input={input} setInput={setInput} loading={loading} onSend={send} onKey={handleKey} endRef={endRef} onBack={()=>setActiveId(null)}/>
            : <CommandCenter agents={AGENTS} onSelect={setActiveId} onRunSystem={()=>setActiveId("system")}/>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
